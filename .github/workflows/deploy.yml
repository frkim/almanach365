name: Deploy to Azure Storage Static Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_RESOURCE_GROUP: rg-almanach365
  AZURE_STORAGE_ACCOUNT: almanach365
  AZURE_LOCATION: westeurope
  AZURE_FRONTDOOR_PROFILE: ${{ secrets.AZURE_FRONTDOOR_PROFILE }}
  AZURE_FRONTDOOR_ENDPOINT: ${{ secrets.AZURE_FRONTDOOR_ENDPOINT }}

jobs:
  # ----- Infrastructure (Bicep) -----
  infra:
    name: Provision infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: infra/main.parameters.json
          failOnStdErr: false

      - name: Enable static website
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob service-properties update \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --static-website \
              --index-document index.html \
              --404-document index.html

  # ----- Deploy static files -----
  deploy:
    name: Upload to $web
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload files to $web container
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --destination '$web' \
              --source . \
              --overwrite \
              --content-type 'text/html' \
              --pattern '*.html'

            az storage blob upload-batch \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --destination '$web' \
              --source . \
              --overwrite \
              --content-type 'text/css' \
              --pattern 'css/*.css'

            az storage blob upload-batch \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --destination '$web' \
              --source . \
              --overwrite \
              --content-type 'application/javascript' \
              --pattern 'js/*.js'

            az storage blob upload-batch \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --destination '$web' \
              --source . \
              --overwrite \
              --content-type 'application/json' \
              --pattern 'data/*.json'

            az storage blob upload \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --container-name '$web' \
              --file favicon.svg \
              --name favicon.svg \
              --overwrite \
              --content-type 'image/svg+xml'

            az storage blob upload \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --container-name '$web' \
              --file favicon-32.png \
              --name favicon-32.png \
              --overwrite \
              --content-type 'image/png'

            az storage blob upload \
              --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --container-name '$web' \
              --file apple-touch-icon.png \
              --name apple-touch-icon.png \
              --overwrite \
              --content-type 'image/png'

      - name: Show website URL
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage account show --name ${{ env.AZURE_STORAGE_ACCOUNT }} \
              --query "primaryEndpoints.web" --output tsv

      - name: Purge Front Door cache
        if: ${{ env.AZURE_FRONTDOOR_PROFILE != '' && env.AZURE_FRONTDOOR_ENDPOINT != '' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az afd endpoint purge \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --profile-name ${{ env.AZURE_FRONTDOOR_PROFILE }} \
              --endpoint-name ${{ env.AZURE_FRONTDOOR_ENDPOINT }} \
              --content-paths '/*'
